name: Go CI

on:
  push:
    branches:
      - "production"
      - "staging"
      - "dev_backend"
      - "dev_frontend"
  pull_request:
    branches: [ "production", "staging", "dev_backend", "dev_frontend" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build Go Application
      run: go build -o goTerminal -v ./...

    - name: Test Go Application
      run: go test -v ./...

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set Docker Image Tag
      id: set_image_tag
      run: |
        # Use commit SHA as the primary tag for uniqueness
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        # Also create a branch-specific tag (sanitized)
        BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed -e "s/[^a-zA-Z0-9]/-/g" | cut -c1-63 | sed -e "s/^-*//g" -e "s/-*$//g" | tr '[:upper:]' '[:lower:]')
        if [ "$BRANCH_NAME" == "production" ]; then
          echo "BRANCH_TAG=production" >> $GITHUB_ENV
        elif [ "$BRANCH_NAME" == "staging" ]; then
          echo "BRANCH_TAG=staging" >> $GITHUB_ENV
        elif [ "$BRANCH_NAME" == "dev_backend" ]; then
          echo "BRANCH_TAG=dev_backend" >> $GITHUB_ENV
        else
          echo "BRANCH_TAG=latest" >> $GITHUB_ENV # Fallback for other branches
        fi

    - name: Build and Push Docker image
      env:
        DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      run: |
        docker build -t $DOCKER_REPO:${{ env.IMAGE_TAG }} -t $DOCKER_REPO:${{ env.BRANCH_TAG }} .
        docker push $DOCKER_REPO:${{ env.IMAGE_TAG }}
        docker push $DOCKER_REPO:${{ env.BRANCH_TAG }}

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Kubeconfig for Staging
      uses: azure/k8s-set-context@v3
      with:
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

    - name: Deploy to Staging
      env:
        DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      run: |
        sed -i "s|image: goterminal-app:latest|image: $DOCKER_REPO:${{ github.sha }}|g" kubernetes/deployment.yaml
        
        kubectl apply -f kubernetes/deployment.yaml
        kubectl apply -f kubernetes/service.yaml
        kubectl apply -f kubernetes/hpa.yaml

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Kubeconfig for Production
      uses: azure/k8s-set-context@v3
      with:
        kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

    - name: Deploy to Production
      env:
        DOCKER_REPO: ${{ secrets.DOCKER_REPO }}
      run: |
        sed -i "s|image: goterminal-app:latest|image: $DOCKER_REPO:${{ github.sha }}|g" kubernetes/deployment.yaml
        
        kubectl apply -f kubernetes/deployment.yaml
        kubectl apply -f kubernetes/service.yaml
        kubectl apply -f kubernetes/hpa.yaml